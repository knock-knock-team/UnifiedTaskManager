                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    bearerQuery:
      type: apiKey
      in: query
      name: token
      description: Bearer access token in query (WebSocket clients)

  parameters:
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User ID
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    TeamIdHeader:
      name: X-Team-Id
      in: header
      required: true
      schema:
        type: string
      description: Active team for task/column APIs
    TeamIdQuery:
      name: teamId
      in: query
      required: true
      schema:
        type: string
    ProjectIdQuery:
      name: projectId
      in: query
      required: true
      schema:
        type: string
    ProjectIdPath:
      name: projectId
      in: path
      required: true
      schema:
        type: string
    TeamIdPath:
      name: teamId
      in: path
      required: true
      schema:
        type: string
    TaskIdPath:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    ColumnIdPath:
      name: columnId
      in: path
      required: true
      schema:
        type: string
    CommentIdPath:
      name: commentId
      in: path
      required: true
      schema:
        type: string
    InviteIdPath:
      name: inviteId
      in: path
      required: true
      schema:
        type: string
    RoomIdPath:
      name: roomId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CallIdPath:
      name: callId
      in: path
      required: true
      schema:
        type: string
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      description: Expected entity version (ETag from prior response)

  responses:
    BadRequest:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Not enough permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    VersionConflict:
      description: Optimistic concurrency conflict (412)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/VersionConflictResponse'

  schemas:
    SimpleMessage:
      type: object
      properties:
        message:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - name
        - role
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          minLength: 1
          maxLength: 120
        role:
          type: string
          enum: [user, manager, admin]
        status:
          type: string
          enum: [active, inactive, suspended]
        tag:
          type: string
        bio:
          type: string
        githubUrl:
          type: string
        linkedInUrl:
          type: string
        telegram:
          type: string
        websiteUrl:
          type: string
        secondaryEmail:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
        name:
          type: string
          minLength: 1
          maxLength: 120

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Access token lifetime in seconds

    AuthResponse:
      type: object
      required: [user, tokens]
      properties:
        user:
          $ref: '#/components/schemas/User'
        tokens:
          $ref: '#/components/schemas/TokenPair'

    UpdateCurrentUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        tag:
          type: string
        bio:
          type: string
        githubUrl:
          type: string
        linkedInUrl:
          type: string
        telegram:
          type: string
        websiteUrl:
          type: string
        secondaryEmail:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
      minProperties: 1

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        role:
          type: string
          enum: [user, manager, admin]
        status:
          type: string
          enum: [active, inactive, suspended]
      minProperties: 1

    UserListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      required: [message]
      properties:
        code:
          type: string
          description: Present on user-service errors (e.g. UNAUTHORIZED)
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    VersionConflictResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          enum: [VERSION_CONFLICT]
        message:
          type: string
          example: version conflict
        current:
          description: Latest task, column, or columns list
          oneOf:
            - $ref: '#/components/schemas/Task'
            - $ref: '#/components/schemas/TaskColumn'
            - type: array
              items:
                $ref: '#/components/schemas/TaskColumn'

    CreateRoomRequest:
      type: object
      required: [participantIds]
      properties:
        title:
          type: string
          maxLength: 120
        participantIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    SendMessageRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 4000

    RoomDetails:
