name: unified-task-manager

services:
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      GATEWAY_HTTP_ADDR: :8081
      GATEWAY_USER_SERVICE_URL: http://user-service:8082
      GATEWAY_TASK_SERVICE_URL: http://task-service:8083
      GATEWAY_CHAT_SERVICE_URL: http://chat-service:8084
      GATEWAY_CALL_SERVICE_URL: http://host.docker.internal:8086
      GATEWAY_FILE_SERVICE_URL: http://file-service:8088
      GATEWAY_ML_SERVICE_URL: http://ml-service:8087
      GATEWAY_NOTIFICATION_SERVICE_URL: http://notification-service:8089
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      - user-service
      - task-service
      - chat-service
      - file-service
      - ml-service
      - notification-service
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      args:
        VITE_TURN_URL: ${VITE_TURN_URL:-}
        VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-}
        VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-}
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    depends_on:
      - api-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 2s
      retries: 10
      start_period: 3s

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      HTTP_ADDR: :8082
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      USE_IN_MEMORY: "false"
      AUTO_MIGRATE: "true"
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      TASK_SERVICE_HTTP_ADDR: :8083
      TASK_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      TASK_USE_IN_MEMORY: "false"
      TASK_AUTO_MIGRATE: "true"
      TASK_RABBITMQ_ENABLED: "true"
      TASK_RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      TASK_RABBITMQ_EXCHANGE: task.events
      TASK_USER_SERVICE_URL: http://user-service:8082
      TASK_BOARD_REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      CHAT_SERVICE_HTTP_ADDR: 0.0.0.0:8084
      CHAT_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      CHAT_RABBITMQ_EXCHANGE: chat.events
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  sfu-service:
    build:
      context: .
      dockerfile: services/sfu-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    network_mode: host
    env_file: ${ENV_FILE:-.env.production}
    environment:
      SFU_ADDR: :8086
      SFU_UDP_PORT_MIN: ${SFU_UDP_PORT_MIN:-50000}
      SFU_UDP_PORT_MAX: ${SFU_UDP_PORT_MAX:-50100}
      JWT_SECRET: ${JWT_SECRET}
      TURN_URL: turn:coturn:3478
      VITE_TURN_URL: ${VITE_TURN_URL:-}
      VITE_TURN_USERNAME: ${VITE_TURN_USERNAME:-turnuser}
      VITE_TURN_CREDENTIAL: ${VITE_TURN_CREDENTIAL:-change-me-turn-password}

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      FILE_SERVICE_HTTP_ADDR: :8088
      FILE_SERVICE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      FILE_SERVICE_STORAGE_ROOT: /var/lib/unified-task-manager-file-service/storage
      FILE_SERVICE_RABBITMQ_ENABLED: "true"
      FILE_SERVICE_RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      FILE_SERVICE_USER_SERVICE_URL: http://user-service:8082
      FILE_SERVICE_USER_EXISTS_QUEUE: user-service.user-exists
      FILE_SERVICE_DELETED_FILE_QUEUE: task-service.file-deleted
      FILE_SERVICE_AGENT_COMMANDS_QUEUE: file-service.agent-commands
      FILE_SERVICE_RPC_TIMEOUT_SECONDS: "3"
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - unified_task_manager_file_service_storage:/var/lib/unified-task-manager-file-service/storage
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  ml-service:
    build:
      context: .
      dockerfile: services/ml-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      ML_SERVICE_RABBITMQ_ENABLED: "true"
      ML_SERVICE_RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/%2f
      TASK_SERVICE_AGENT_COMMANDS_QUEUE: task-service.agent-commands
      FILE_SERVICE_AGENT_COMMANDS_QUEUE: file-service.agent-commands
      TASK_FILE_AGENT_GATEWAY_BASE_URL: http://api-gateway:8081
      TASK_FILE_AGENT_USER_SERVICE_BASE_URL: http://user-service:8082
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
      LOGGER_LEVEL: ${LOGGER_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    pull_policy: never
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env.production}
    environment:
      NOTIFICATION_SERVICE_HTTP_ADDR: :8089
      NOTIFICATION_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      NOTIFICATION_USER_SERVICE_URL: http://user-service:8082
      NOTIFICATION_AUTO_MIGRATE: "true"
      NOTIFICATION_AUTO_SEND_ENABLED: ${NOTIFICATION_AUTO_SEND_ENABLED:-true}
      NOTIFICATION_DEADLINE_LOOKAHEAD_MINUTES: ${NOTIFICATION_DEADLINE_LOOKAHEAD_MINUTES:-1440}
      NOTIFICATION_DEFAULT_URGENT_BEFORE_MINUTES: ${NOTIFICATION_DEFAULT_URGENT_BEFORE_MINUTES:-120}
      NOTIFICATION_SCAN_INTERVAL_SECONDS: ${NOTIFICATION_SCAN_INTERVAL_SECONDS:-300}
      PUBLIC_FRONTEND_URL: ${PUBLIC_FRONTEND_URL}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - unified_task_manager_postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --lt-cred-mech
      - --user=${VITE_TURN_USERNAME:-turnuser}:${VITE_TURN_CREDENTIAL:-change-me-turn-password}
      - --realm=${TURN_REALM:-unified-task-manager}
      - --external-ip=${TURN_EXTERNAL_IP}/${TURN_RELAY_IP}
      - --relay-ip=${TURN_RELAY_IP}
      - --listening-ip=0.0.0.0
      - --no-cli
      - --no-multicast-peers
      - --min-port=49160
      - --max-port=49999

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/vps.conf:/etc/nginx/conf.d/default.conf:ro
      - unified_task_manager_nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      api-gateway:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-knock-knock-team.ru}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - unified_task_manager_caddy_data:/data
      - unified_task_manager_caddy_config:/config
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - unified_task_manager_prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - user-service
      - task-service
      - chat-service
      - sfu-service
      - file-service
      - ml-service
      - notification-service
    networks:
      - backend

  loki:
    image: grafana/loki:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - unified_task_manager_loki_data:/loki
    networks:
      - backend

  promtail:
    image: grafana/promtail:3.2.1
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
    environment:
      ENVIRONMENT: ${ENV:-production}
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - unified_task_manager_nginx_logs:/var/log/nginx:ro
    depends_on:
      - loki
    networks:
      - backend

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - unified_task_manager_grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - backend

volumes:
  unified_task_manager_postgres_data:
  unified_task_manager_file_service_storage:
  unified_task_manager_nginx_logs:
  unified_task_manager_caddy_data:
  unified_task_manager_caddy_config:
  unified_task_manager_prometheus_data:
  unified_task_manager_loki_data:
  unified_task_manager_grafana_data:

networks:
  backend:
    driver: bridge
